<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markas Gacor - Pasukan</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            background: #1a1a1a; 
            color: #fff; 
        }
        h1 { color: #ffcc00; margin-bottom: 10px; }
        p { color: #ccc; margin-bottom: 30px; }
        .btn { 
            display: block; 
            width: 100%; 
            max-width: 400px; 
            margin: 15px auto; 
            padding: 20px; 
            font-size: 18px; 
            background: #ffcc00; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer;
            color: #000;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .footer { margin-top: 50px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <h1>SELAMAT DATANG</h1>
    <p>Markas Gacor - Sistem Kerja Terpadu</p>

    <button class="btn" onclick="window.location.href='googlechrome://navigate?url=https://myaccount.google.com/brandaccounts'">🚀 1. PINTU BRAND ACCOUNT (Chrome)</button>

    <button class="btn" onclick="window.location.href='firefox-focus://open?url=https://www.youtube.com/signin?action_handle_signin=true&next=%2Faccount_advanced&feature=sign_in_button'">🦊 2. PINTU SETELAN DEFAULT (Firefox Focus)</button>

    <div class="footer">
        *Ingat SOP: Centang "Situs Desktop" secara manual di Firefox Focus<br><br>
        Sistem Aman - Semua Sesi Terhapus Saat Browser Ditutup
    </div>

</body>
</html>
