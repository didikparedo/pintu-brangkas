<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markas Gacor - Pasukan</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            background: #1a1a1a; 
            color: #fff; 
        }
        h1 { color: #ffcc00; margin-bottom: 10px; }
        p { color: #ccc; margin-bottom: 30px; }
        .btn { 
            display: block; 
            width: 100%; 
            max-width: 400px; 
            margin: 15px auto; 
            padding: 20px; 
            font-size: 18px; 
            background: #ffcc00; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer;
            color: #000;
            text-decoration: none; 
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .footer { margin-top: 50px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <h1>SELAMAT DATANG</h1>
    <p>Markas Gacor - Sistem Kerja Terpadu</p>

    <!-- Tombol 1: Paksa buka pakai Chrome (Format Android Intent) -->
    <a class="btn" href="intent://myaccount.google.com/brandaccounts#Intent;scheme=https;package=com.android.chrome;end">🚀 1. PINTU BRAND ACCOUNT (Chrome)</a>

    <!-- Tombol 2: Paksa buka pakai Firefox Focus (Format Android Intent) -->
    <a class="btn" href="intent://www.youtube.com/signin?action_handle_signin=true&next=%2Faccount_advanced&feature=sign_in_button#Intent;scheme=https;package=org.mozilla.focus;end">🦊 2. PINTU SETELAN DEFAULT (Firefox Focus)</a>

    <div class="footer">
        *Ingat SOP: Centang "Situs Desktop" secara manual di Firefox Focus<br><br>
        Sistem Aman - Semua Sesi Terhapus Saat Browser Ditutup
    </div>

</body>
</html>
